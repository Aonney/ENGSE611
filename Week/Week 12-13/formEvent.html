<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Username Validation</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    width:320px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    font-size:16px;
    border:2px solid #ccc;
    border-radius:6px;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#2196f3;
}

.message{
    margin-top:8px;
    font-size:14px;
}

.error{
    color:red;
}

.success{
    color:green;
}
</style>
</head>

<body>

<div class="container">

<input type="text" id="username" placeholder="Username (ต้องมี 3+ ตัวอักษร)">
<div id="msg" class="message"></div>

</div>

<script>

let username = document.getElementById("username");
let msg = document.getElementById("msg");


// เมื่อ focus ที่ช่อง
username.addEventListener("focus", function(){
    this.style.backgroundColor = "#e3f2fd";
});


// เมื่อออกจากช่อง
username.addEventListener("blur", function(){

    this.style.backgroundColor = "";

    if(this.value.length < 3){

        this.style.borderColor = "red";
        msg.textContent = "Username ต้องมีอย่างน้อย 3 ตัวอักษร";
        msg.className = "message error";

    }else{

        this.style.borderColor = "green";
        msg.textContent = "Username ใช้งานได้";
        msg.className = "message success";

    }

});

</script>

</body>
</html>
